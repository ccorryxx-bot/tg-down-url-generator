name: Process Universal Media
on:
  workflow_dispatch:
    inputs:
      media_link:
        description: 'Link to the media'
        required: true
      target_chat_id:
        description: 'Telegram Chat ID'
        required: true
      quality:
        description: 'Video quality (360, 480, 720)'
        required: true
        default: '720'

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install yt-dlp
        run: sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp && sudo chmod a+rx /usr/local/bin/yt-dlp
      - name: Install dependencies
        run: |
          pip install telethon hachoir aiohttp requests boto3
      - name: Run processor
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          STRING_SESSION: ${{ secrets.STRING_SESSION }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          B2_BUCKET_NAME: ${{ secrets.B2_BUCKET_NAME }}
          B2_ENDPOINT: ${{ secrets.B2_ENDPOINT }}
          TARGET_CHAT_ID: ${{ github.event.inputs.target_chat_id }}
          MEDIA_LINK: ${{ github.event.inputs.media_link }}
          QUALITY: ${{ github.event.inputs.quality }}
        run: python processor.py
