name: Process Media WF1
on:
  workflow_dispatch:
    inputs:
      media_link:
        description: 'Link to the media'
        required: true
      target_chat_id:
        description: 'Telegram Chat ID'
        required: true
      quality:
        description: 'Video quality'
        required: true
        default: '720'

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install FFmpeg (static binary - fast)
        timeout-minutes: 2
        run: |
          wget -q "https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz" -O /tmp/ffmpeg.tar.xz
          tar -xf /tmp/ffmpeg.tar.xz -C /tmp/
          sudo mv /tmp/ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/ffmpeg
          sudo mv /tmp/ffmpeg-master-latest-linux64-gpl/bin/ffprobe /usr/local/bin/ffprobe
          sudo chmod +x /usr/local/bin/ffmpeg /usr/local/bin/ffprobe
          ffmpeg -version | head -1

      - name: Install yt-dlp
        timeout-minutes: 2
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version

      - name: Install Python dependencies
        timeout-minutes: 3
        run: pip install telethon hachoir aiohttp requests boto3

      - name: Run processor
        timeout-minutes: 110
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          STRING_SESSION_1: ${{ secrets.STRING_SESSION_1 }}
          CF_AUTH_EMAIL: ${{ secrets.CF_AUTH_EMAIL }}
          CF_AUTH_KEY: ${{ secrets.CF_AUTH_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          B2_BUCKET_NAME: ${{ secrets.B2_BUCKET_NAME }}
          B2_ENDPOINT: ${{ secrets.B2_ENDPOINT }}
          TARGET_CHAT_ID: ${{ github.event.inputs.target_chat_id }}
          MEDIA_LINK: ${{ github.event.inputs.media_link }}
          QUALITY: ${{ github.event.inputs.quality }}
          WF_NAME: "WF1"
        run: python processor.py
